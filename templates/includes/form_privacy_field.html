<div class="col-12{% if field.errors %} is-field-invalid{% endif %}">
    <div class="form-check">
        {{ field }}
        <label class="form-check-label" for="{{ field.id_for_label }}">
            Ich stimme der Verarbeitung meiner Daten gemäß
            <a href="{% url 'leads:privacy' %}" target="_blank" rel="noopener">Datenschutzerklärung</a>
            zu.
        </label>
    </div>
    {% if field.errors %}
        <div class="field-error-message" role="alert">
            {% for error in field.errors %}<div>{{ error }}</div>{% endfor %}
        </div>
    {% endif %}
</div>
